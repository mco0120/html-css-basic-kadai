<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <meta name="description" content="このページは22章の課題です。">
        <title>22章課題</title>
    </head>
    <body>
       
        <header>
            <h1>今日の傘予報</h1>
        </header>  
 
        <main>

            <div id="parent">
                <div class="contents">
                    <h2><span class="dot">●</span>東京の天気</h2>
                    <p>今日の天気は<span class="rainy">雨</span>です。</p>
                    <p><span class="umbrella">傘</span>を持って行ってください。</p>
                    <img src="images/rainy.png" alt="雨">
                </div>
 
                <div class="contents">
                    <h2><span class="dot">●</span>北海道の天気</h2>
                    <p>今日の天気は<span class="cloudy">曇り</span>です。</p>
                    <p><span class="umbrella">傘</span>は念のため持って行きましょう。</p>
                    <img src="images/cloudy.png" alt="曇り">
                </div>
 
                <div class="contents">
                    <h2><span class="dot">●</span>沖縄の天気</h2>
                    <p>今日の天気は<span class="sunny">晴れ</span>です。</p>
                    <p><span class="umbrella">傘</span>は必要ないでしょう</p>
                    <img src="images/sunny.png" alt="晴れ">
                </div>

            </div>    
 
        </main>
 
        <footer>
            <a href="https://www.sejuku.net/corp/">&copy;SAMURAI WEATHER NEWS</a>
         </footer>
 
    </body>
</html>
